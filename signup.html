<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | PhysicsMaster.ng</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #0f3460, #16213e); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 1rem; }
        .signup-box { background: white; border-radius: 20px; padding: 2.5rem; width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        h1 { color: #0f3460; text-align: center; margin-bottom: 0.5rem; }
        h1 span { color: #00d2ff; font-size: 0.9rem; display: block; }
        h2 { text-align: center; margin-bottom: 1.5rem; color: #333; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 1rem; }
        input:focus { outline: none; border-color: #0f3460; }
        button { width: 100%; padding: 12px; background: #ffd700; color: #0f3460; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        .links { text-align: center; margin-top: 1.5rem; }
        .links a { color: #0f3460; text-decoration: none; font-weight: bold; }
        .error { color: red; text-align: center; margin-top: 10px; font-size: 0.9rem; }
        .success { color: #00a86b; text-align: center; margin-top: 10px; font-size: 0.9rem; }
        .info-note { background: #e8f4f8; padding: 10px; border-radius: 8px; margin-top: 15px; font-size: 0.8rem; text-align: center; color: #0f3460; }
    </style>
</head>
<body>
    <div class="signup-box">
        <h1>⚡ PhysicsMaster.ng</h1>
        <span style="display:block; text-align:center; color:#00d2ff; font-size:0.9rem; margin-bottom:1rem;">Create Your Account</span>
        <h2>Sign Up</h2>
        <input type="text" id="name" placeholder="Full Name">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password (min 6 characters)">
        <input type="password" id="confirm" placeholder="Confirm Password">
        <button onclick="signup()">Sign Up — It's Free!</button>
        <div id="error" class="error"></div>
        <div id="success" class="success"></div>
        <div class="links">
            Already have an account? <a href="login.html">Login</a>
        </div>
        <div class="info-note">
            <strong>📋 Note:</strong> Use any valid email. Premium features require payment verification.
        </div>
    </div>
    <script>
        function signup() {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;
            const errorDiv = document.getElementById('error');
            const successDiv = document.getElementById('success');
            
            errorDiv.textContent = '';
            successDiv.textContent = '';
            
            // Validation
            if (!name || !email || !password) {
                errorDiv.textContent = '❌ All fields are required.';
                return;
            }
            
            // Name validation (at least 2 characters, letters and spaces only)
            if (name.length < 2) {
                errorDiv.textContent = '❌ Name must be at least 2 characters.';
                return;
            }
            
            if (!/^[a-zA-Z\s'-]+$/.test(name)) {
                errorDiv.textContent = '❌ Name can only contain letters and spaces.';
                return;
            }
            
            // Email basic format check (allows any valid-looking email)
            if (!email.includes('@') || !email.includes('.') || email.length < 5) {
                errorDiv.textContent = '❌ Please enter a valid email address.';
                return;
            }
            
            // Prevent obviously fake emails
            const blockedDomains = ['test.com', 'example.com', 'mailinator.com', 'tempmail.com', 'fake.com', 'noemail.com'];
            const domain = email.split('@')[1];
            if (blockedDomains.includes(domain)) {
                errorDiv.textContent = '❌ Please use a real email address.';
                return;
            }
            
            if (password !== confirm) {
                errorDiv.textContent = '❌ Passwords do not match.';
                return;
            }
            
            if (password.length < 6) {
                errorDiv.textContent = '❌ Password must be at least 6 characters.';
                return;
            }
            
            // Get existing users
            let users = JSON.parse(localStorage.getItem('physics_users')) || [];
            
            // Check if email already exists
            if (users.find(u => u.email === email)) {
                errorDiv.textContent = '❌ Email already registered. Please <a href="login.html" style="color:#0f3460;">login</a>.';
                return;
            }
            
            // Limit accounts from same browser (prevent spam)
            const accountCount = users.filter(u => {
                const created = new Date(u.createdAt);
                const now = new Date();
                return (now - created) < 24 * 60 * 60 * 1000; // Last 24 hours
            }).length;
            
            if (accountCount >= 3) {
                errorDiv.textContent = '⚠️ Too many accounts created. Please try again later.';
                return;
            }
            
            // Create new user
            const newUser = {
                id: Date.now().toString(),
                email: email,
                password: password,
                name: name,
                premium: false,
                questions: 0,
                questionsDate: new Date().toDateString(),
                createdAt: new Date().toISOString()
            };
            
            users.push(newUser);
            localStorage.setItem('physics_users', JSON.stringify(users));
            
            // Auto-login
            sessionStorage.setItem('currentUser', JSON.stringify({
                id: newUser.id,
                email: newUser.email,
                name: newUser.name,
                premium: false,
                questions: 0
            }));
            
            successDiv.textContent = '✅ Account created! Redirecting...';
            
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        }
    </script>
</body>
</html>
